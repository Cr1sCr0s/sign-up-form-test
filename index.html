<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="header-content">
      <img 
      src="images/logo.png" 
      class="header-logo" 
      alt="Animaze logo"
      width="150px"
      height="150px">
      <h1 class="header-title">ANIMAZE</h1>
    </div>
    <p class="credit-photo">photo from "Delicious in Dungeon"</p>
  </header>

  <main class="main">

    <p class="main-desc">
      This is not a real online service. Although, you're free to think 
      of this as a site to help you watch anime for free. Sign up 
      <em>now</em> to get started.
      <br><br>
      You <em>know</em> you want to.
    </p>

    <form action="" method="" id="sign-up" class="form">
      <h2 class="form-title">Let's do this!</h2>

      <div class="form-table">
        <div class="form-row">
          <div class="form-field">
            <label for='fname'>FIRST NAME *</label>
            <input 
              id='fname' 
              name='fname' 
              type='text' 
              placeholder="Natsuki"
              minlength="1"
              maxlength="40"
              required/>
          </div>
          <div class="form-field">
            <label for='lname'>LAST NAME</label>
            <input 
              id='lname' 
              name='lname' 
              type='text'
              placeholder="Subaru"
              minlength="1"
              maxlength="40"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label for='email'>EMAIL *</label>
            <input 
              id='email' 
              name='email' 
              type='email' 
              placeholder="barusu@gmail.com"
              required/>    
          </div>
          <div class="form-field">
            <label for='phone-no'>PHONE NO</label>
            <input 
              id='phone-no' 
              name='phone-no' 
              type='tel'
              placeholder="09123456789"
              minlength="11"
              maxlength="11"
              pattern="09[0-9]{9}"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label for='password'>PASSWORD *</label>
            <input 
              id='password' 
              name='password' 
              type='password' 
              minlength="8"
              required/>    
          </div>
          <div class="form-field">
            <label for='confirm-password'>CONFIRM PASSWORD *</label>
            <input 
              id='confirm-password' 
              name='confirm-password' 
              type='password'
              minlength="8"
              required/>
          </div>
        </div>
      </div>
    </form>

    <button type="submit" form="sign-up" class="main-button">Create Account</button>

    <p>
      Already have an account? 
      <span class="main-link"><a href="#">Log in</a></span>
    </p>

    <p class="credit-photo">photo from "One Punch Man"</p>

  </main>

  <div class="banner"></div>
</body>
</html>
